# ═══════════════════════════════════════════════════════════════════════════════
# Telclaude Docker Compose - 3-Container Deployment
#
# For deployment targets with pre-built images.
# Mirrors docker-compose.yml topology.
#
# Usage:
#   1. Build images locally:
#        docker build -t telclaude:latest -f docker/Dockerfile .
#        docker build -t telclaude-whatsapp-bridge:latest -f docker/Dockerfile.whatsapp-bridge .
#        docker build -t telclaude-totp:latest -f docker/Dockerfile.totp .
#        docker build -t telclaude-vault:latest -f docker/Dockerfile.vault .
#   2. Ship to target:
#        docker save telclaude:latest telclaude-totp:latest telclaude-vault:latest \
#          | ssh target "docker load"
#   3. Copy this file, .env, telclaude.json, and telclaude-private.json to target
#   4. Run setup: docker/setup-volumes.sh
#   5. docker compose -f docker-compose.deploy.yml up -d
#
# 3 containers:
#   telclaude        — Relay (secrets, security, routing)
#   totp             — TOTP sidecar (encrypted 2FA)
#   vault            — Vault sidecar (encrypted credentials)
#
# 5 networks (segmented):
#   runner-relay-net   (bridge)   — runner ↔ relay
#   relay-totp-net     (internal) — relay ↔ totp
#   relay-vault-net    (internal) — relay ↔ vault
#   relay-egress       (bridge)   — relay → Telegram/Anthropic
#   vault-egress       (bridge)   — vault → OAuth token endpoints
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # Main Relay Service (secrets, routing — no workspace or runtime execution)
  # ─────────────────────────────────────────────────────────────────────────────
  telclaude:
    image: telclaude:latest
    container_name: telclaude

    depends_on:
      totp:
        condition: service_healthy
      vault:
        condition: service_healthy

    environment:
      # ── Credentials (vault preferred, env vars as fallback) ───────────────
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - ANTHROPIC_PROXY_TOKEN=${ANTHROPIC_PROXY_TOKEN:-}

      # Secrets encryption — enables keychain fallback (decrypts secrets.json for vault import)
      # Defaults to TOTP key when SECRETS_ENCRYPTION_KEY is not explicitly set
      - SECRETS_ENCRYPTION_KEY=${SECRETS_ENCRYPTION_KEY:-${TOTP_ENCRYPTION_KEY}}

      # Telclaude configuration (policy + private overlay)
      - TELCLAUDE_CONFIG=/data/telclaude.json
      - TELCLAUDE_PRIVATE_CONFIG=/data/telclaude-private.json
      - TELCLAUDE_DATA_DIR=/data
      - TELCLAUDE_LOG_LEVEL=${TELCLAUDE_LOG_LEVEL:-info}

      # Relay keeps its own auth/profile state, but skills live in the shared catalog.
      - CLAUDE_CONFIG_DIR=/home/telclaude-auth
      - TELCLAUDE_CLAUDE_HOME=/home/telclaude-auth
      - TELCLAUDE_AUTH_DIR=/home/telclaude-auth
      - TELCLAUDE_SKILL_CATALOG_DIR=/home/telclaude-skill-catalog

      - X_USER_ID=${X_USER_ID:-}
      - TELCLAUDE_X_PROXY_URL=http://localhost:8792/api.x.com
      - TELCLAUDE_CAPABILITIES_ENABLED=1

      # RPC auth — relay holds agent PUBLIC keys (verifies agent→relay) + relay PRIVATE keys (signs relay→agent)
      - OPERATOR_RPC_AGENT_PUBLIC_KEY=${OPERATOR_RPC_AGENT_PUBLIC_KEY:-}
      - OPERATOR_RPC_RELAY_PRIVATE_KEY=${OPERATOR_RPC_RELAY_PRIVATE_KEY:-}
      - TELEGRAM_RPC_AGENT_PUBLIC_KEY=${TELEGRAM_RPC_AGENT_PUBLIC_KEY:-}
      - TELEGRAM_RPC_RELAY_PRIVATE_KEY=${TELEGRAM_RPC_RELAY_PRIVATE_KEY:-}
      - SOCIAL_RPC_AGENT_PUBLIC_KEY=${SOCIAL_RPC_AGENT_PUBLIC_KEY:-}
      - SOCIAL_RPC_RELAY_PRIVATE_KEY=${SOCIAL_RPC_RELAY_PRIVATE_KEY:-}
      - TELCLAUDE_GIT_PROXY_SECRET=${TELCLAUDE_GIT_PROXY_SECRET:-}

      # Media paths
      - TELCLAUDE_MEDIA_INBOX_DIR=/media/inbox
      - TELCLAUDE_MEDIA_OUTBOX_DIR=/media/outbox

      # Sidecar sockets
      - TELCLAUDE_TOTP_SOCKET=/run/totp/totp.sock
      - TELCLAUDE_VAULT_SOCKET=/run/vault/vault.sock

      # Network / firewall
      - TELCLAUDE_FIREWALL=${TELCLAUDE_FIREWALL:-1}
      - TELCLAUDE_INTERNAL_HOSTS=${TELCLAUDE_INTERNAL_HOSTS:-telclaude}
      - TELCLAUDE_WHATSAPP_SIDECAR_URL=${TELCLAUDE_WHATSAPP_SIDECAR_URL:-http://whatsapp-bridge:3004}
      - TELCLAUDE_WHATSAPP_BRIDGE_SECRET=${TELCLAUDE_WHATSAPP_BRIDGE_SECRET:-}
      - TELCLAUDE_WHATSAPP_ALLOWED_RECIPIENTS=${TELCLAUDE_WHATSAPP_ALLOWED_RECIPIENTS:-}
      # Signed WhatsApp inbound bridge events. The relay verifies this HMAC before CL-1.
      - TELCLAUDE_WHATSAPP_INBOUND_SECRET=${TELCLAUDE_WHATSAPP_INBOUND_SECRET:-}
      - TELCLAUDE_WHATSAPP_INBOUND_OPERATOR_ADDRESSES=${TELCLAUDE_WHATSAPP_INBOUND_OPERATOR_ADDRESSES:-}
      - TELCLAUDE_WHATSAPP_INBOUND_PROFILE_ID=${TELCLAUDE_WHATSAPP_INBOUND_PROFILE_ID:-default}
      - TELCLAUDE_WHATSAPP_INBOUND_ACTOR_ID=${TELCLAUDE_WHATSAPP_INBOUND_ACTOR_ID:-}
      - TELCLAUDE_WHATSAPP_INBOUND_DISPLAY_NAME=${TELCLAUDE_WHATSAPP_INBOUND_DISPLAY_NAME:-}
      # Relay egress policy: restricted (domain allowlist) or permissive (all public
      # egress; metadata/RFC1918 stay kernel-blocked). tc_web_fetch executes in the
      # relay, so the free-GET web capability requires permissive.
      - TELCLAUDE_NETWORK_MODE=${TELCLAUDE_NETWORK_MODE:-restricted}
      # Brave Search API key for the relay-served tc_web_search capability.
      - TELCLAUDE_BRAVE_SEARCH_API_KEY=${TELCLAUDE_BRAVE_SEARCH_API_KEY:-}
      - TELCLAUDE_ACCEPT_NO_FIREWALL=${TELCLAUDE_ACCEPT_NO_FIREWALL:-0}
      - TELCLAUDE_ALLOW_DEGRADED_PROVIDERS=${TELCLAUDE_ALLOW_DEGRADED_PROVIDERS:-0}

      # Set to 1 only if your kernel has quirks with gosu privilege dropping
      - TELCLAUDE_RUN_AS_ROOT=${TELCLAUDE_RUN_AS_ROOT:-0}
      - NODE_ENV=production

    volumes:
      - telclaude-data:/data:rw
      - ./telclaude.json:/data/telclaude.json:ro
      - ./telclaude-private.json:/data/telclaude-private.json:ro
      - telclaude-claude-auth:/home/telclaude-auth:rw
      - telclaude-skill-catalog:/home/telclaude-skill-catalog:rw
      - totp-socket:/run/totp:rw
      - vault-socket:/run/vault:ro
      - social-memory:/social/memory:rw
      - media-inbox:/media/inbox:rw
      - media-outbox:/media/outbox:rw

    user: "0:0"

    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
      - DAC_OVERRIDE
      - CHOWN
      - FOWNER
      - SETUID
      - SETGID

    security_opt:
      - no-new-privileges:true
      - apparmor:telclaude-relay

    read_only: true
    tmpfs:
      - /tmp:size=512M,mode=1777
      - /home/node:size=256M,mode=0755
      - /run/telclaude:size=1M,mode=0755

    # Resource limits (non-Swarm Compose v2)
    mem_limit: 2G
    cpus: 4

    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 256M

    networks:
      - runner-relay-net
      - relay-totp-net
      - relay-vault-net
      - relay-whatsapp-net
      - relay-egress

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8790/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────────────────────
  # WhatsApp Bridge Sidecar (optional profile)
  # ─────────────────────────────────────────────────────────────────────────────
  whatsapp-bridge:
    profiles: ["whatsapp"]
    image: ${TELCLAUDE_WHATSAPP_BRIDGE_IMAGE:-telclaude-whatsapp-bridge:latest}
    container_name: telclaude-whatsapp-bridge

    environment:
      - WHATSAPP_BRIDGE_PORT=3004
      - WHATSAPP_BRIDGE_DATA_DIR=/data
      - TELCLAUDE_RELAY_INBOUND_URL=http://telclaude:8790/v1/whatsapp/inbound
      - TELCLAUDE_WHATSAPP_BRIDGE_SECRET=${TELCLAUDE_WHATSAPP_BRIDGE_SECRET:-}
      - TELCLAUDE_WHATSAPP_INBOUND_SECRET=${TELCLAUDE_WHATSAPP_INBOUND_SECRET:-}
      - NODE_ENV=production

    volumes:
      - whatsapp-bridge-data:/data:rw

    networks:
      - relay-whatsapp-net
      - whatsapp-egress

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3004/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────────────────────
  # TOTP Daemon Sidecar (encrypted 2FA, no external network)
  # ─────────────────────────────────────────────────────────────────────────────
  totp:
    image: telclaude-totp:latest
    container_name: telclaude-totp

    environment:
      - TOTP_STORAGE_BACKEND=file
      - TOTP_ENCRYPTION_KEY=${TOTP_ENCRYPTION_KEY:?TOTP_ENCRYPTION_KEY is required}
      - TOTP_SECRETS_FILE=/data/totp-secrets.json
      - TELCLAUDE_TOTP_SOCKET=/run/totp/totp.sock
      - TELCLAUDE_DATA_DIR=/data
      - TELCLAUDE_LOG_LEVEL=${TELCLAUDE_LOG_LEVEL:-info}
      - NODE_ENV=production

    volumes:
      - totp-data:/data:rw
      - totp-socket:/run/totp:rw

    security_opt:
      - no-new-privileges:true

    user: "1000:1000"

    cap_drop:
      - ALL

    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
      - /home/node/.telclaude/logs:size=16M,mode=0755,uid=1000,gid=1000

    # Resource limits (non-Swarm Compose v2)
    mem_limit: 128M
    cpus: 0.5

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M

    networks:
      - relay-totp-net

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "test", "-S", "/run/totp/totp.sock"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ─────────────────────────────────────────────────────────────────────────────
  # Vault Daemon Sidecar (encrypted credentials, no external network)
  # ─────────────────────────────────────────────────────────────────────────────
  vault:
    image: telclaude-vault:latest
    container_name: telclaude-vault

    environment:
      - VAULT_ENCRYPTION_KEY=${VAULT_ENCRYPTION_KEY:?VAULT_ENCRYPTION_KEY is required}
      - TELCLAUDE_VAULT_SOCKET=/run/vault/vault.sock
      # Temporary compatibility mode for the external GitHub runner container.
      # Follow-up should tighten this to 0660 with a shared group or replace the
      # shared socket with a dedicated token endpoint.
      - TELCLAUDE_VAULT_SOCKET_MODE=${TELCLAUDE_VAULT_SOCKET_MODE:-0666}
      - TELCLAUDE_DATA_DIR=/data
      - TELCLAUDE_LOG_LEVEL=${TELCLAUDE_LOG_LEVEL:-info}
      - NODE_ENV=production

    volumes:
      - vault-data:/data:rw
      - vault-socket:/run/vault:rw

    security_opt:
      - no-new-privileges:true
      - apparmor:telclaude-vault

    user: "1000:1000"

    cap_drop:
      - ALL

    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
      - /home/node/.telclaude/logs:size=16M,mode=0755,uid=1000,gid=1000

    # Resource limits (non-Swarm Compose v2)
    mem_limit: 128M
    cpus: 0.5

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M

    networks:
      - relay-vault-net
      - vault-egress  # Required for OAuth2 token refresh (outbound to token endpoints)

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "test", "-S", "/run/vault/vault.sock"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

# ═══════════════════════════════════════════════════════════════════════════════
# Named Volumes
#
# CRITICAL: Run `docker/setup-volumes.sh` before first `docker compose up`.
# NEVER run `docker compose down -v` - it will delete non-external volumes!
# ═══════════════════════════════════════════════════════════════════════════════
volumes:
  # Main relay data: SQLite DB, sessions, identity links, approvals
  telclaude-data:
    name: telclaude-data

  # ┌─────────────────────────────────────────────────────────────────────────────┐
  # │ CRITICAL SECRETS - External volumes (protected from accidental deletion)   │
  # └─────────────────────────────────────────────────────────────────────────────┘

  # Claude auth profile (OAuth tokens) - relay only
  telclaude-claude-auth:
    name: telclaude-claude-auth
    external: true

  # TOTP daemon data: encrypted 2FA secrets
  totp-data:
    name: telclaude-totp-data
    external: true

  # Vault daemon data: encrypted credentials
  vault-data:
    name: telclaude-vault-data
    external: true

  # Shared Unix sockets (tmpfs)
  totp-socket:
    name: telclaude-totp-socket
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=1M,uid=1000,gid=1000

  vault-socket:
    name: telclaude-vault-socket
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=1M,uid=1000,gid=1000

  # Shared media volumes
  media-inbox:
    name: telclaude-media-inbox
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=512M,uid=1000,gid=1000,mode=0700

  media-outbox:
    name: telclaude-media-outbox

  # WhatsApp bridge session state (QR/browser auth lives outside agent runtime)
  whatsapp-bridge-data:
    name: telclaude-whatsapp-bridge-data

  # Shared operator-managed skill catalog (active + draft) across all Hermes personas.
  telclaude-skill-catalog:
    name: telclaude-skill-catalog
    external: true

  # Social shared memory (relay RW)
  social-memory:
    name: telclaude-social-memory

# ═══════════════════════════════════════════════════════════════════════════════
# Networks
# ═══════════════════════════════════════════════════════════════════════════════
networks:
  runner-relay-net:
    name: telclaude-runner-relay
    driver: bridge

  relay-totp-net:
    name: telclaude-relay-totp
    driver: bridge
    internal: true

  relay-vault-net:
    name: telclaude-relay-vault
    driver: bridge
    internal: true

  # Dedicated relay↔WhatsApp bridge network. Only the relay and the external
  # whatsapp-bridge sidecar should join this network; never attach agent,
  # Hermes, vault, provider, workspace, or media containers here.
  relay-whatsapp-net:
    name: telclaude-relay-whatsapp
    driver: bridge
    internal: true

  # WhatsApp bridge outbound network. The relay is intentionally not attached;
  # only the bridge sidecar gets internet egress for WhatsApp Web transport.
  whatsapp-egress:
    name: telclaude-whatsapp-egress
    driver: bridge

  relay-egress:
    name: telclaude-relay-egress
    driver: bridge

  vault-egress:
    name: telclaude-vault-egress
    driver: bridge
