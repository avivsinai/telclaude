# ═══════════════════════════════════════════════════════════════════════════════
# Telclaude Docker Compose Configuration
#
# For Windows (WSL2) deployment with security hardening.
#
# Usage:
#   1. Copy .env.example to .env and fill in your values
#   2. Update WORKSPACE_PATH to point to your projects folder
#   3. docker compose up -d
#
# Security features:
#   - Privilege dropping via gosu (starts root, drops to UID 1000)
#   - Capability dropping (cap_drop: ALL, then add back only what's needed)
#   - Read-only root filesystem (with tmpfs for writes)
#   - Optional network firewall (requires root at startup, hence gosu pattern)
#   - Named volumes for persistence
#   - TOTP sidecar with encrypted file storage
#   - Vault sidecar with encrypted credential storage
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # Main Relay Service
  # ─────────────────────────────────────────────────────────────────────────────
  telclaude:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        USER_UID: 1000
        USER_GID: 1000
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
    image: telclaude:latest
    container_name: telclaude

    # Wait for sidecars to be ready
    depends_on:
      totp:
        condition: service_healthy
      vault:
        condition: service_healthy
      google-services:
        condition: service_healthy

    environment:
      # ── Credentials now live in vault ──────────────────────────────────────
      # Bot token, API keys, OAuth tokens, and RPC keys are stored in vault.
      # Run `telclaude vault import-secrets` and `telclaude vault import-anthropic`
      # to migrate existing credentials.
      #
      # Env var fallbacks (optional, for migration/bootstrap):
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}

      # Anthropic proxy token — runtime workers use this to authenticate with the relay's Anthropic proxy
      - ANTHROPIC_PROXY_TOKEN=${ANTHROPIC_PROXY_TOKEN:-}

      # OpenAI Codex relay-proxy HMAC signing secret — RELAY ONLY (never mounted
      # into runtime containers). The relay mints short-lived, peer-bound per-job
      # tokens for /codex work units; runtime workers never hold this secret.
      - TELCLAUDE_OPENAI_CODEX_PROXY_TOKEN=${TELCLAUDE_OPENAI_CODEX_PROXY_TOKEN:-}

      # Telclaude configuration (policy + private overlay)
      - TELCLAUDE_CONFIG=/data/telclaude.json
      - TELCLAUDE_PRIVATE_CONFIG=/data/telclaude-private.json
      - TELCLAUDE_DATA_DIR=/data
      - TELCLAUDE_LOG_LEVEL=${TELCLAUDE_LOG_LEVEL:-info}
      # Relay keeps its own auth/profile state, but skills live in the shared catalog.
      - CLAUDE_CONFIG_DIR=/home/telclaude-auth
      - TELCLAUDE_CLAUDE_HOME=/home/telclaude-auth
      - TELCLAUDE_AUTH_DIR=/home/telclaude-auth
      - TELCLAUDE_SKILL_CATALOG_DIR=/home/telclaude-skill-catalog
      # X/Twitter — relay routes through its own credential proxy
      - X_USER_ID=${X_USER_ID:-}
      - TELCLAUDE_X_PROXY_URL=http://localhost:8792/api.x.com
      - TELCLAUDE_CAPABILITIES_ENABLED=1
      # RPC auth — relay holds agent PUBLIC keys (verifies agent→relay) + relay PRIVATE keys (signs relay→agent)
      - OPERATOR_RPC_AGENT_PUBLIC_KEY=${OPERATOR_RPC_AGENT_PUBLIC_KEY:-}
      - OPERATOR_RPC_RELAY_PRIVATE_KEY=${OPERATOR_RPC_RELAY_PRIVATE_KEY:-}
      - TELEGRAM_RPC_AGENT_PUBLIC_KEY=${TELEGRAM_RPC_AGENT_PUBLIC_KEY:-}
      - TELEGRAM_RPC_RELAY_PRIVATE_KEY=${TELEGRAM_RPC_RELAY_PRIVATE_KEY:-}
      - SOCIAL_RPC_AGENT_PUBLIC_KEY=${SOCIAL_RPC_AGENT_PUBLIC_KEY:-}
      - SOCIAL_RPC_RELAY_PRIVATE_KEY=${SOCIAL_RPC_RELAY_PRIVATE_KEY:-}
      # Git proxy session token secret (shared with agent for HMAC validation)
      - TELCLAUDE_GIT_PROXY_SECRET=${TELCLAUDE_GIT_PROXY_SECRET:-}
      - TELCLAUDE_MEDIA_INBOX_DIR=/media/inbox
      - TELCLAUDE_MEDIA_OUTBOX_DIR=/media/outbox

      # TOTP daemon socket (shared with sidecar)
      - TELCLAUDE_TOTP_SOCKET=/run/totp/totp.sock

      # Vault daemon socket (shared with sidecar)
      - TELCLAUDE_VAULT_SOCKET=/run/vault/vault.sock

      # SECURITY: Network firewall REQUIRED (Bash has no isolation without it)
      # Set TELCLAUDE_FIREWALL=1 in .env file (requires --cap-add=NET_ADMIN)
      - TELCLAUDE_FIREWALL=${TELCLAUDE_FIREWALL:-1}
      # Internal hosts allowed through firewall
      - TELCLAUDE_INTERNAL_HOSTS=${TELCLAUDE_INTERNAL_HOSTS:-telclaude,google-services}
      # Optional external WhatsApp bridge; attach it only to telclaude-relay-whatsapp.
      - TELCLAUDE_WHATSAPP_SIDECAR_URL=${TELCLAUDE_WHATSAPP_SIDECAR_URL:-http://whatsapp-bridge:3004}
      - TELCLAUDE_WHATSAPP_BRIDGE_SECRET=${TELCLAUDE_WHATSAPP_BRIDGE_SECRET:-}
      - TELCLAUDE_WHATSAPP_ALLOWED_RECIPIENTS=${TELCLAUDE_WHATSAPP_ALLOWED_RECIPIENTS:-}
      # Signed WhatsApp inbound bridge events. The relay verifies this HMAC before CL-1.
      - TELCLAUDE_WHATSAPP_INBOUND_SECRET=${TELCLAUDE_WHATSAPP_INBOUND_SECRET:-}
      - TELCLAUDE_WHATSAPP_INBOUND_OPERATOR_ADDRESSES=${TELCLAUDE_WHATSAPP_INBOUND_OPERATOR_ADDRESSES:-}
      - TELCLAUDE_WHATSAPP_INBOUND_PROFILE_ID=${TELCLAUDE_WHATSAPP_INBOUND_PROFILE_ID:-default}
      - TELCLAUDE_WHATSAPP_INBOUND_ACTOR_ID=${TELCLAUDE_WHATSAPP_INBOUND_ACTOR_ID:-}
      - TELCLAUDE_WHATSAPP_INBOUND_DISPLAY_NAME=${TELCLAUDE_WHATSAPP_INBOUND_DISPLAY_NAME:-}
      # Relay egress policy: restricted (domain allowlist) or permissive (all public
      # egress; metadata/RFC1918 stay kernel-blocked). tc_web_fetch executes in the
      # relay, so the free-GET web capability requires permissive.
      - TELCLAUDE_NETWORK_MODE=${TELCLAUDE_NETWORK_MODE:-restricted}
      # Brave Search API key for the relay-served tc_web_search capability.
      - TELCLAUDE_BRAVE_SEARCH_API_KEY=${TELCLAUDE_BRAVE_SEARCH_API_KEY:-}

      # Drop privileges after firewall init (gosu -> node user).
      # LLM/persona execution runs through the Hermes overlay.
      - TELCLAUDE_RUN_AS_ROOT=0

      # Node environment
      - NODE_ENV=production

    volumes:
      # Persistent data (SQLite DB, sessions, config)
      - telclaude-data:/data:rw

      # Configuration files (policy = all containers, private = relay only)
      - ./telclaude.json:/data/telclaude.json:ro
      - ./telclaude-private.json:/data/telclaude-private.json:ro

      # Claude auth/profile state (OAuth tokens + settings) — relay-only
      - telclaude-claude-auth:/home/telclaude-auth:rw
      # Shared skill catalog (active + draft) across relay, private, and social.
      - telclaude-skill-catalog:/home/telclaude-skill-catalog:rw

      # Shared socket for TOTP daemon communication
      - totp-socket:/run/totp:rw

      # Shared socket for vault daemon communication (relay reads credentials)
      - vault-socket:/run/vault:ro

      # Social memory (relay is single writer)
      - social-memory:/social/memory:rw

      # Shared media volumes (inbox/outbox split)
      - media-inbox:/media/inbox:rw
      - media-outbox:/media/outbox:rw

    # Start as root for firewall init, then drop to node via gosu.
    # LLM/persona execution runs through the Hermes overlay.
    user: "0:0"

    # Explicit capability management (no privileged mode)
    # Note: Some kernels require explicit caps even for root
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN   # Required for iptables firewall initialization
      - DAC_OVERRIDE  # Required for file access as root on some kernels
      - CHOWN       # Required for changing file ownership
      - FOWNER      # Required for bypassing ownership checks
      - SETUID      # Required for gosu privilege dropping
      - SETGID      # Required for gosu privilege dropping

    security_opt:
      - no-new-privileges:true
      - apparmor:telclaude-relay

    read_only: true
    tmpfs:
      - /tmp:size=512M,mode=1777
      - /home/node:size=256M,mode=0755
      - /run/telclaude:size=1M,mode=0755

    # Resource limits for non-Swarm Docker Compose (deploy.resources is Swarm-only)
    mem_limit: 4G
    cpus: 4

    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 512M

    networks:
      - runner-relay-net
      - relay-totp-net
      - relay-vault-net
      - relay-google-net
      - relay-whatsapp-net
      - relay-egress
      - relay-israel-net

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8790/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────────────────────
  # WhatsApp Bridge Sidecar
  #
  # Optional profile-gated bridge for WhatsApp Web transport. The relay owns all
  # policy, approval, and recipient allowlist checks; the bridge only transports
  # approved sends on relay-whatsapp-net and reaches WhatsApp only through its
  # own whatsapp-egress network. The relay never joins whatsapp-egress.
  # ─────────────────────────────────────────────────────────────────────────────
  whatsapp-bridge:
    profiles: ["whatsapp"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.whatsapp-bridge
      args:
        USER_UID: 1000
        USER_GID: 1000
    image: ${TELCLAUDE_WHATSAPP_BRIDGE_IMAGE:-telclaude-whatsapp-bridge:latest}
    container_name: telclaude-whatsapp-bridge

    environment:
      - WHATSAPP_BRIDGE_PORT=3004
      - WHATSAPP_BRIDGE_DATA_DIR=/data
      - TELCLAUDE_RELAY_INBOUND_URL=http://telclaude:8790/v1/whatsapp/inbound
      - TELCLAUDE_WHATSAPP_BRIDGE_SECRET=${TELCLAUDE_WHATSAPP_BRIDGE_SECRET:-}
      - TELCLAUDE_WHATSAPP_INBOUND_SECRET=${TELCLAUDE_WHATSAPP_INBOUND_SECRET:-}
      - NODE_ENV=production

    volumes:
      - whatsapp-bridge-data:/data:rw

    networks:
      - relay-whatsapp-net
      - whatsapp-egress

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3004/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - ALL

    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────────────────────
  # Google Services Sidecar
  #
  # Fastify REST server providing Gmail, Calendar, Drive, Contacts access.
  # Reads OAuth tokens from vault via Unix socket. Agents route requests
  # through the relay's provider proxy — never call this directly.
  # ─────────────────────────────────────────────────────────────────────────────
  google-services:
    build:
      context: ..
      dockerfile: docker/Dockerfile.google-services
      args:
        USER_UID: 1000
        USER_GID: 1000
    image: telclaude-google-services:latest
    container_name: telclaude-google-services

    environment:
      - PORT=3002
      - TELCLAUDE_VAULT_SOCKET=/run/vault/vault.sock
      - DATA_DIR=/data
      - LOG_LEVEL=${TELCLAUDE_LOG_LEVEL:-info}
      - NODE_ENV=production

    volumes:
      # JTI replay store (SQLite)
      - google-data:/data:rw

      # Shared vault socket for OAuth tokens
      - vault-socket:/run/vault:ro

    security_opt:
      - no-new-privileges:true

    user: "1000:1000"

    cap_drop:
      - ALL

    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
      - /home/node:size=64M,mode=0755,uid=1000,gid=1000

    mem_limit: 256M
    cpus: 1

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

    networks:
      - relay-google-net
      - google-egress  # Outbound to googleapis.com

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3002/v1/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ─────────────────────────────────────────────────────────────────────────────
  # TOTP Daemon Sidecar
  #
  # Handles 2FA operations with encrypted file storage.
  # Communicates with relay via Unix socket on shared volume.
  #
  # SECURITY: Network isolation enforced via internal-only network (relay-totp-net).
  # The TOTP container has NO external network connectivity - it only talks to relay
  # via the shared socket. No iptables/firewall needed since there's no egress route.
  # ─────────────────────────────────────────────────────────────────────────────
  totp:
    build:
      context: ..
      dockerfile: docker/Dockerfile.totp
      args:
        USER_UID: 1000
        USER_GID: 1000
    image: telclaude-totp:latest
    container_name: telclaude-totp

    environment:
      # Storage backend: file (encrypted) instead of keytar (OS keychain)
      - TOTP_STORAGE_BACKEND=file

      # Encryption key for TOTP secrets (REQUIRED)
      # Generate with: openssl rand -base64 32
      - TOTP_ENCRYPTION_KEY=${TOTP_ENCRYPTION_KEY:?TOTP_ENCRYPTION_KEY is required}

      # File paths
      - TOTP_SECRETS_FILE=/data/totp-secrets.json
      - TELCLAUDE_TOTP_SOCKET=/run/totp/totp.sock
      - TELCLAUDE_DATA_DIR=/data
      - TELCLAUDE_LOG_LEVEL=${TELCLAUDE_LOG_LEVEL:-info}

      - NODE_ENV=production

    volumes:
      # Persistent TOTP data (encrypted secrets file)
      - totp-data:/data:rw

      # Shared socket for relay communication
      - totp-socket:/run/totp:rw

    security_opt:
      - no-new-privileges:true

    user: "1000:1000"

    cap_drop:
      - ALL

    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
      - /home/node/.telclaude/logs:size=16M,mode=0755,uid=1000,gid=1000

    # Resource limits for non-Swarm Docker Compose (deploy.resources is Swarm-only)
    mem_limit: 128M
    cpus: 0.5

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M

    networks:
      - relay-totp-net

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "test", "-S", "/run/totp/totp.sock"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  # ─────────────────────────────────────────────────────────────────────────────
  # Vault Daemon Sidecar
  #
  # Stores credentials encrypted at rest (AES-256-GCM) and exposes them via
  # Unix socket. The relay's HTTP credential proxy reads from the socket and
  # injects credentials into outbound requests transparently.
  #
  # SECURITY: No external network connectivity (relay-vault-net is internal).
  # The vault container only talks to relay via the shared socket volume.
  # No curl, git, or other utilities installed.
  # ─────────────────────────────────────────────────────────────────────────────
  vault:
    build:
      context: ..
      dockerfile: docker/Dockerfile.vault
      args:
        USER_UID: 1000
        USER_GID: 1000
    image: telclaude-vault:latest
    container_name: telclaude-vault

    environment:
      # Encryption key for credential storage (REQUIRED)
      # Generate with: openssl rand -base64 32
      # IMPORTANT: Keep this safe! If lost, all stored credentials become unrecoverable.
      - VAULT_ENCRYPTION_KEY=${VAULT_ENCRYPTION_KEY:?VAULT_ENCRYPTION_KEY is required}

      # Socket path (shared with relay via volume)
      - TELCLAUDE_VAULT_SOCKET=/run/vault/vault.sock
      # Temporary compatibility mode for the external GitHub runner container.
      # Follow-up should tighten this to 0660 with a shared group or replace the
      # shared socket with a dedicated token endpoint.
      - TELCLAUDE_VAULT_SOCKET_MODE=${TELCLAUDE_VAULT_SOCKET_MODE:-0666}
      - TELCLAUDE_DATA_DIR=/data
      - TELCLAUDE_LOG_LEVEL=${TELCLAUDE_LOG_LEVEL:-info}

      - NODE_ENV=production

    volumes:
      # Persistent vault data (encrypted credentials file)
      - vault-data:/data:rw

      # Shared socket for relay communication
      - vault-socket:/run/vault:rw

    security_opt:
      - no-new-privileges:true
      - apparmor:telclaude-vault

    user: "1000:1000"

    cap_drop:
      - ALL

    read_only: true
    tmpfs:
      - /tmp:size=64M,mode=1777
      - /home/node/.telclaude/logs:size=16M,mode=0755,uid=1000,gid=1000

    # Resource limits for non-Swarm Docker Compose (deploy.resources is Swarm-only)
    mem_limit: 128M
    cpus: 0.5

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M

    networks:
      - relay-vault-net
      - vault-egress  # Required for OAuth2 token refresh (outbound to token endpoints)

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "test", "-S", "/run/vault/vault.sock"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

# ═══════════════════════════════════════════════════════════════════════════════
# Named Volumes
#
# CRITICAL: Some volumes contain secrets that CANNOT be recovered if deleted.
# Run `docker/setup-volumes.sh` before first `docker compose up`.
# NEVER run `docker compose down -v` - it will delete all volumes!
# ═══════════════════════════════════════════════════════════════════════════════
volumes:
  # Main relay data: SQLite DB, sessions, identity links, approvals
  telclaude-data:
    name: telclaude-data

  # ┌─────────────────────────────────────────────────────────────────────────────┐
  # │ CRITICAL SECRETS - External volumes (protected from accidental deletion)   │
  # │ These must be pre-created: docker volume create <name>                      │
  # │ `docker compose down -v` CANNOT delete external volumes                     │
  # └─────────────────────────────────────────────────────────────────────────────┘

  # Claude auth profile (OAuth tokens) - relay only
  # Can be recreated via `claude login` but causes service interruption
  telclaude-claude-auth:
    name: telclaude-claude-auth
    external: true

  # TOTP daemon data: encrypted 2FA secrets
  # ⚠️  CANNOT BE RECOVERED IF DELETED - user must re-enroll all 2FA
  totp-data:
    name: telclaude-totp-data
    external: true

  # Vault daemon data: encrypted credentials
  # ⚠️  CANNOT BE RECOVERED IF DELETED - user must re-add all credentials
  vault-data:
    name: telclaude-vault-data
    external: true

  # Shared Unix socket for relay ↔ TOTP communication
  # Uses tmpfs for better performance and automatic cleanup
  totp-socket:
    name: telclaude-totp-socket
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=1M,uid=1000,gid=1000

  # Shared Unix socket for relay ↔ vault communication
  # Uses tmpfs for better performance and automatic cleanup
  vault-socket:
    name: telclaude-vault-socket
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=1M,uid=1000,gid=1000

  # Shared media inbox - size capped
  media-inbox:
    name: telclaude-media-inbox
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=512M,uid=1000,gid=1000,mode=0700

  # Shared media outbox - persistent for generated content
  media-outbox:
    name: telclaude-media-outbox

  # WhatsApp bridge session state (QR/browser auth lives outside agent runtime)
  whatsapp-bridge-data:
    name: telclaude-whatsapp-bridge-data

  # Google services data (JTI replay store)
  google-data:
    name: telclaude-google-data

  # Social shared memory (relay RW)
  social-memory:
    name: telclaude-social-memory

  # Shared operator-managed skill catalog (active + draft) across all Hermes personas.
  telclaude-skill-catalog:
    name: telclaude-skill-catalog
    external: true

# ═══════════════════════════════════════════════════════════════════════════════
# Networks
# ═══════════════════════════════════════════════════════════════════════════════
networks:
  relay-totp-net:
    name: telclaude-relay-totp
    driver: bridge
    internal: true

  relay-vault-net:
    name: telclaude-relay-vault
    driver: bridge
    internal: true

  relay-egress:
    name: telclaude-relay-egress
    driver: bridge

  relay-google-net:
    name: telclaude-relay-google
    driver: bridge
    internal: true

  # Dedicated relay↔WhatsApp bridge network. Only the relay and the external
  # whatsapp-bridge sidecar should join this network; never attach agent,
  # Hermes, vault, provider, workspace, or media containers here.
  relay-whatsapp-net:
    name: telclaude-relay-whatsapp
    driver: bridge
    internal: true

  # WhatsApp bridge outbound network. The relay is intentionally not attached;
  # only the bridge sidecar gets internet egress for WhatsApp Web transport.
  whatsapp-egress:
    name: telclaude-whatsapp-egress
    driver: bridge

  google-egress:
    name: telclaude-google-egress
    driver: bridge

  vault-egress:
    name: telclaude-vault-egress
    driver: bridge

  # Dedicated relay↔israel-services network. NOT internal — must be joinable
  # by the israel-services container from its own compose project.
  # After deploy: docker network connect telclaude-relay-israel israel-services
  relay-israel-net:
    name: telclaude-relay-israel
    driver: bridge

  # Dedicated relay↔runner network. NOT internal — must be joinable
  # by the external GitHub runner compose project.
  runner-relay-net:
    name: telclaude-runner-relay
    driver: bridge
