# Browser trust-domain overlay for Hermes public web browsing.
#
# Usage:
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.browser.yml up -d telclaude tc-browser
#
# Required operator env: TELCLAUDE_BROWSER_SUBNET, TELCLAUDE_BROWSER_RELAY_IP,
# TELCLAUDE_BROWSER_IP, and TELCLAUDE_BROWSER_CONTEXT_TOKEN_SECRET.
#
# `tc-browser` is intentionally not on provider, vault, model, WhatsApp, or
# Hermes runtime networks. It can reach only the relay over relay-browser-net;
# internet egress must go through the relay-owned CONNECT proxy.

services:
  telclaude:
    environment:
      - TELCLAUDE_BROWSER_CONNECT_PROXY_ENABLED=1
      - TELCLAUDE_BROWSER_CONNECT_PROXY_HOST=0.0.0.0
      - TELCLAUDE_BROWSER_CONNECT_PROXY_PORT=${TELCLAUDE_BROWSER_CONNECT_PROXY_PORT:-8794}
      - TELCLAUDE_BROWSER_CONNECT_PROXY_REQUIRE_CONTEXT=${TELCLAUDE_BROWSER_CONNECT_PROXY_REQUIRE_CONTEXT:-1}
      - TELCLAUDE_BROWSER_CONNECT_PROXY_CLIENT_TO_UPSTREAM_BYTES=${TELCLAUDE_BROWSER_CONNECT_PROXY_CLIENT_TO_UPSTREAM_BYTES:-2097152}
      - TELCLAUDE_BROWSER_CONTEXT_TOKEN_SECRET=${TELCLAUDE_BROWSER_CONTEXT_TOKEN_SECRET:?generate a relay-scoped browser context token secret}
      - TELCLAUDE_BROWSER_WS_ENDPOINT=ws://tc-browser:${TELCLAUDE_BROWSER_PORT:-3006}${TELCLAUDE_BROWSER_WS_PATH:-/playwright}
      - TELCLAUDE_BROWSER_CONNECT_PROXY_URL=http://telclaude:${TELCLAUDE_BROWSER_CONNECT_PROXY_PORT:-8794}
      - TELCLAUDE_BROWSER_PEER_ADDRESS=${TELCLAUDE_BROWSER_IP:?set tc-browser static container IP for context token binding}
      - TELCLAUDE_INTERNAL_HOSTS=${TELCLAUDE_INTERNAL_HOSTS:-telclaude,google-services,tc-browser}
    networks:
      relay-browser-net:
        ipv4_address: ${TELCLAUDE_BROWSER_RELAY_IP:?set relay static container IP on relay-browser-net}

  tc-browser:
    build:
      context: ..
      dockerfile: docker/Dockerfile.browser
      args:
        CAMOUFOX_VERSION: ${TELCLAUDE_CAMOUFOX_VERSION:-0.4.11}
        PLAYWRIGHT_VERSION: ${TELCLAUDE_BROWSER_PLAYWRIGHT_VERSION:-1.59.0}
    image: ${TELCLAUDE_BROWSER_IMAGE:-telclaude-browser:camoufox-0.4.11-pw-1.59.0}
    container_name: tc-browser
    depends_on:
      telclaude:
        condition: service_healthy
    environment:
      - TELCLAUDE_BROWSER_HOST=tc-browser
      - TELCLAUDE_BROWSER_PORT=${TELCLAUDE_BROWSER_PORT:-3006}
      - TELCLAUDE_BROWSER_INTERNAL_PORT=${TELCLAUDE_BROWSER_INTERNAL_PORT:-3106}
      - TELCLAUDE_BROWSER_WS_PATH=${TELCLAUDE_BROWSER_WS_PATH:-/playwright}
      - TELCLAUDE_BROWSER_WS_ENDPOINT=ws://tc-browser:${TELCLAUDE_BROWSER_PORT:-3006}${TELCLAUDE_BROWSER_WS_PATH:-/playwright}
      - TELCLAUDE_BROWSER_CONNECT_PROXY_URL=http://telclaude:${TELCLAUDE_BROWSER_CONNECT_PROXY_PORT:-8794}
      - NO_PROXY=127.0.0.1,localhost,::1
      - no_proxy=127.0.0.1,localhost,::1
      - NODE_ENV=production
    user: "10001:10001"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=256M,mode=1777,noexec
      - /home/browser:size=256M,uid=10001,gid=10001,mode=0700
    pids_limit: 256
    mem_limit: 2G
    cpus: 2
    networks:
      relay-browser-net:
        ipv4_address: ${TELCLAUDE_BROWSER_IP:?set tc-browser static container IP on relay-browser-net}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "/usr/local/bin/telclaude-browser-canary.py", "--health-once"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

networks:
  # Load-bearing isolation boundary: no service other than the relay and
  # tc-browser may join this network. The BrowserServer endpoint itself has no
  # application-layer auth; relay-only network membership is the access control.
  relay-browser-net:
    name: telclaude-relay-browser
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: ${TELCLAUDE_BROWSER_SUBNET:?set relay-browser subnet containing relay and tc-browser IPs}
