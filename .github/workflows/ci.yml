name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build

      - name: Verify build artifacts
        run: |
          test -f dist/index.js
          test -f dist/index.d.ts

  deploy:
    name: Deploy
    needs: [verify]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, deploy]
    environment: production
    concurrency:
      group: production
      cancel-in-progress: false
    steps:
      - name: Pull latest
        run: git -C ~/telclaude pull --ff-only

      - name: Build and restart
        run: cd ~/telclaude && ./docker/build.sh && cd docker && docker compose up -d

      - name: Wait for healthy
        run: |
          sleep 5
          cd ~/telclaude/docker && docker compose ps --format json | \
            python3 -c "
          import sys, json
          lines = sys.stdin.read().strip().split('\n')
          all_ok = True
          for line in lines:
              svc = json.loads(line)
              name = svc.get('Name', 'unknown')
              state = svc.get('State', 'unknown')
              health = svc.get('Health', '')
              if state != 'running':
                  print(f'FAIL: {name} is {state}')
                  all_ok = False
              elif health and health != 'healthy':
                  print(f'WARN: {name} health={health}')
          if all_ok:
              print('All containers running')
          else:
              sys.exit(1)
          "
