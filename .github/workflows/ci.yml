name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel in-progress verify runs on new pushes, but never cancel deploys
  # (deploy job has its own concurrency group with cancel-in-progress: false)
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    # The Hermes wrapper suite adds heavy crypto/containment tests; tests/commands/hermes.test.ts
    # alone runs ~15 min as a single file (vitest can't parallelize within one file), which set a
    # floor above the old 10-min cap. Deploy needs:[verify], so this must complete post-merge too.
    # Follow-up: split hermes.test.ts so vitest parallelizes it and this can come back down.
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build

      - name: Verify build artifacts
        run: |
          test -f dist/index.js
          test -f dist/index.d.ts

  deploy:
    name: Deploy
    needs: [verify]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, deploy]
    timeout-minutes: 30
    environment: production
    concurrency:
      group: production
      cancel-in-progress: false
    steps:
      - name: Pull latest
        run: git -C ~/telclaude fetch origin +refs/heads/main:refs/remotes/origin/main && git -C ~/telclaude reset --hard origin/main

      - name: Generate Hermes deploy keys
        run: |
          private_key="$(openssl rand -base64 48 | tr '+/' '-_' | tr -d '=')"
          social_key="$(openssl rand -base64 48 | tr '+/' '-_' | tr -d '=')"
          echo "::add-mask::${private_key}"
          echo "::add-mask::${social_key}"
          {
            echo "TELCLAUDE_HERMES_API_SERVER_KEY=${private_key}"
            echo "TELCLAUDE_HERMES_SOCIAL_API_SERVER_KEY=${social_key}"
          } >> "$GITHUB_ENV"

      - name: Build and deploy
        run: cd ~/telclaude && ./docker/build.sh && cd docker && COMPOSE_FILE=docker-compose.yml docker compose up -d --wait --wait-timeout 180
