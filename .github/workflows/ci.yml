name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel in-progress verify runs on new pushes, but never cancel deploys
  # (deploy job has its own concurrency group with cancel-in-progress: false)
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    # The Hermes wrapper suite adds heavy crypto/containment tests; tests/commands/hermes.test.ts
    # alone runs ~15 min as a single file (vitest can't parallelize within one file), which set a
    # floor above the old 10-min cap. Deploy needs:[verify], so this must complete post-merge too.
    # Follow-up: split hermes.test.ts so vitest parallelizes it and this can come back down.
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install system dependencies
        timeout-minutes: 16
        run: |
          set -euo pipefail

          sudo timeout 180s apt-get \
            -o Acquire::Retries=3 \
            -o Acquire::http::Timeout=20 \
            -o Acquire::https::Timeout=20 \
            -o DPkg::Lock::Timeout=30 \
            update

          sudo env DEBIAN_FRONTEND=noninteractive timeout 900s apt-get \
            -o Acquire::Retries=3 \
            -o Acquire::http::Timeout=20 \
            -o Acquire::https::Timeout=20 \
            -o DPkg::Lock::Timeout=30 \
            install -y --no-install-recommends ffmpeg

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm run build

      - name: Verify build artifacts
        run: |
          test -f dist/index.js
          test -f dist/index.d.ts

  deploy:
    name: Deploy
    needs: [verify]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, deploy]
    timeout-minutes: 30
    environment: production
    concurrency:
      group: production
      cancel-in-progress: false
    steps:
      - name: Pull latest
        run: git -C ~/telclaude fetch origin +refs/heads/main:refs/remotes/origin/main && git -C ~/telclaude reset --hard origin/main

      - name: Setup Node.js for deploy verification
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: 22

      - name: Install deploy verification dependencies
        run: |
          set -euo pipefail
          cd ~/telclaude
          corepack enable
          package_manager="$(node -p "require('./package.json').packageManager")"
          corepack prepare "$package_manager" --activate
          pnpm install --frozen-lockfile

      - name: Generate Hermes deploy keys
        run: |
          private_key="$(openssl rand -base64 48 | tr '+/' '-_' | tr -d '=')"
          social_key="$(openssl rand -base64 48 | tr '+/' '-_' | tr -d '=')"
          mcp_relay_token="$(openssl rand -base64 48 | tr '+/' '-_' | tr -d '=')"
          echo "::add-mask::${private_key}"
          echo "::add-mask::${social_key}"
          echo "::add-mask::${mcp_relay_token}"
          {
            echo "TELCLAUDE_HERMES_API_SERVER_KEY=${private_key}"
            echo "TELCLAUDE_HERMES_SOCIAL_API_SERVER_KEY=${social_key}"
            echo "TELCLAUDE_HERMES_MCP_RELAY_TOKEN=${mcp_relay_token}"
          } >> "$GITHUB_ENV"

      - name: Persist William Hermes deploy keys
        run: |
          set -euo pipefail
          shell_env_file="/home/avivsinai/.telclaude-ops/william-release/william-operator.env"
          compose_env_file="/home/avivsinai/telclaude/docker/.env"
          tmp_file="$(mktemp)"
          key_dir="$(mktemp -d)"
          trap 'rm -f "$tmp_file"; rm -rf "$key_dir"' EXIT
          touch "$shell_env_file" "$compose_env_file"
          chmod 600 "$shell_env_file" "$compose_env_file"
          read_deploy_env() {
            local key="$1"
            local file line
            # Prefer the Docker .env value because shell env values are written
            # with %q escaping and are not safe to round-trip into Compose.
            for file in "$compose_env_file" "$shell_env_file"; do
              line="$(grep -E "^(export[[:space:]]+)?${key}=" "$file" 2>/dev/null | tail -n 1 || true)"
              [ -n "$line" ] || continue
              printf '%s' "$line" | sed -E "s/^(export[[:space:]]+)?${key}=//"
              return 0
            done
            return 1
          }
          normalize_internal_hosts() {
            local existing="$1"
            local required="$2"
            local hosts=()
            local host current
            append_host() {
              host="$(printf '%s' "$1" | xargs)"
              [ -n "$host" ] || return 0
              if [ "${#hosts[@]}" -gt 0 ]; then
                for current in "${hosts[@]}"; do
                  [ "$current" = "$host" ] && return 0
                done
              fi
              hosts+=("$host")
            }
            while IFS= read -r host; do append_host "$host"; done < <(printf '%s\n' "$existing" | tr ',[:space:]' '\n')
            while IFS= read -r host; do append_host "$host"; done < <(printf '%s\n' "$required" | tr ',[:space:]' '\n')
            local IFS=,
            printf '%s' "${hosts[*]-}"
          }
          generate_ed25519_pair() {
            local stem="$1"
            local pem_path="$key_dir/${stem}.pem"
            openssl genpkey -algorithm ED25519 -out "$pem_path" >/dev/null 2>&1
            printf '%s_PRIVATE=%s\n' "$stem" "$(openssl pkey -in "$pem_path" -outform DER | base64 -w0)"
            printf '%s_PUBLIC=%s\n' "$stem" "$(openssl pkey -in "$pem_path" -pubout -outform DER | base64 -w0)"
          }
          operator_agent_private_key="$(read_deploy_env OPERATOR_RPC_AGENT_PRIVATE_KEY || true)"
          operator_agent_public_key="$(read_deploy_env OPERATOR_RPC_AGENT_PUBLIC_KEY || true)"
          operator_relay_private_key="$(read_deploy_env OPERATOR_RPC_RELAY_PRIVATE_KEY || true)"
          operator_relay_public_key="$(read_deploy_env OPERATOR_RPC_RELAY_PUBLIC_KEY || true)"
          whatsapp_bridge_secret="$(read_deploy_env TELCLAUDE_WHATSAPP_BRIDGE_SECRET || true)"
          whatsapp_inbound_secret="$(read_deploy_env TELCLAUDE_WHATSAPP_INBOUND_SECRET || true)"
          israel_sidecar_hmac_key="$(read_deploy_env TELCLAUDE_ISRAEL_SIDECAR_HMAC_KEY || true)"
          israel_sidecar_hmac_vault_target="$(read_deploy_env TELCLAUDE_ISRAEL_SIDECAR_HMAC_VAULT_TARGET || true)"
          browser_context_token="$(read_deploy_env TELCLAUDE_BROWSER_CONTEXT_TOKEN_SECRET || true)"
          browser_cookie_store_key="$(read_deploy_env TELCLAUDE_BROWSER_COOKIE_STORE_KEY || true)"
          browser_catastrophic_domains="$(read_deploy_env TELCLAUDE_BROWSER_CATASTROPHIC_DOMAINS || true)"
          browser_subnet="$(read_deploy_env TELCLAUDE_BROWSER_SUBNET || true)"
          browser_relay_ip="$(read_deploy_env TELCLAUDE_BROWSER_RELAY_IP || true)"
          browser_ip="$(read_deploy_env TELCLAUDE_BROWSER_IP || true)"
          internal_hosts="$(read_deploy_env TELCLAUDE_INTERNAL_HOSTS || true)"
          if [ -z "$operator_agent_private_key" ] || [ -z "$operator_agent_public_key" ] || [ -z "$operator_relay_private_key" ] || [ -z "$operator_relay_public_key" ]; then
            while IFS='=' read -r key value; do
              case "$key" in
                OPERATOR_AGENT_PRIVATE) operator_agent_private_key="$value" ;;
                OPERATOR_AGENT_PUBLIC) operator_agent_public_key="$value" ;;
                OPERATOR_RELAY_PRIVATE) operator_relay_private_key="$value" ;;
                OPERATOR_RELAY_PUBLIC) operator_relay_public_key="$value" ;;
              esac
            done < <(
              generate_ed25519_pair OPERATOR_AGENT
              generate_ed25519_pair OPERATOR_RELAY
            )
          fi
          [ -n "$whatsapp_bridge_secret" ] || whatsapp_bridge_secret="$(openssl rand -hex 32)"
          [ -n "$whatsapp_inbound_secret" ] || whatsapp_inbound_secret="$(openssl rand -hex 32)"
          [ -n "$browser_context_token" ] || browser_context_token="$(openssl rand -base64 48 | tr '+/' '-_' | tr -d '=')"
          [ -n "$browser_cookie_store_key" ] || browser_cookie_store_key="$(openssl rand -base64 48 | tr '+/' '-_' | tr -d '=')"
          for secret in "$TELCLAUDE_HERMES_API_SERVER_KEY" "$TELCLAUDE_HERMES_SOCIAL_API_SERVER_KEY" "$TELCLAUDE_HERMES_MCP_RELAY_TOKEN" "$operator_agent_private_key" "$operator_agent_public_key" "$operator_relay_private_key" "$operator_relay_public_key" "$whatsapp_bridge_secret" "$whatsapp_inbound_secret" "$israel_sidecar_hmac_key" "$browser_context_token" "$browser_cookie_store_key"; do
            [ -n "$secret" ] && echo "::add-mask::${secret}"
          done
          hermes_private_subnet='172.30.92.0/24'
          hermes_social_subnet='172.30.93.0/24'
          [ -n "$browser_subnet" ] || browser_subnet='172.30.94.0/24'
          hermes_private_prefix="${hermes_private_subnet%.*}"
          hermes_social_prefix="${hermes_social_subnet%.*}"
          browser_prefix="${browser_subnet%.*}"
          hermes_relay_ip="${hermes_private_prefix}.10"
          hermes_social_relay_ip="${hermes_social_prefix}.10"
          hermes_contained_ip="${hermes_private_prefix}.11"
          hermes_social_ip="${hermes_social_prefix}.11"
          [ -n "$browser_relay_ip" ] || browser_relay_ip="${browser_prefix}.10"
          [ -n "$browser_ip" ] || browser_ip="${browser_prefix}.11"
          hermes_live_mcp_enabled=1
          hermes_live_mcp_admin_enabled=1
          hermes_live_mcp_additional_binds="${hermes_social_relay_ip}@telclaude-hermes-social"
          hermes_live_mcp_allowed_peers="${hermes_contained_ip},${hermes_social_ip}"
          required_internal_hosts='telclaude,google-services,tc-hermes-contained,tc-hermes-social,tc-browser'
          internal_hosts="$(normalize_internal_hosts "$internal_hosts" "$required_internal_hosts")"
          printf 'TELCLAUDE_INTERNAL_HOSTS=%s\n' "$internal_hosts" >> "$GITHUB_ENV"
          shell_key_pattern='^(export[[:space:]]+)?(TELCLAUDE_INTERNAL_HOSTS|TELCLAUDE_HERMES_(API_SERVER_KEY|SOCIAL_API_SERVER_KEY|MCP_RELAY_TOKEN|RELAY_SUBNET|SOCIAL_RELAY_SUBNET|RELAY_IP|SOCIAL_RELAY_IP|CONTAINED_IP|SOCIAL_IP|LIVE_MCP_ENABLED|LIVE_MCP_ADMIN_ENABLED|LIVE_MCP_HOST|LIVE_MCP_ADDITIONAL_BINDS|LIVE_MCP_ALLOWED_PEERS|SERVED_MCP_OFF_DOMAIN_PEER_IP)|TELCLAUDE_BROWSER_(CONTEXT_TOKEN_SECRET|COOKIE_STORE_KEY|CATASTROPHIC_DOMAINS|SUBNET|RELAY_IP|IP)|TELCLAUDE_WHATSAPP_(BRIDGE_SECRET|INBOUND_SECRET)|TELCLAUDE_ISRAEL_SIDECAR_HMAC_(KEY|VAULT_TARGET)|OPERATOR_RPC_(AGENT_PRIVATE_KEY|AGENT_PUBLIC_KEY|RELAY_PRIVATE_KEY|RELAY_PUBLIC_KEY))='
          compose_key_pattern='^(export[[:space:]]+)?(TELCLAUDE_INTERNAL_HOSTS|TELCLAUDE_HERMES_(API_SERVER_KEY|SOCIAL_API_SERVER_KEY|MCP_RELAY_TOKEN|RELAY_SUBNET|SOCIAL_RELAY_SUBNET|RELAY_IP|SOCIAL_RELAY_IP|CONTAINED_IP|SOCIAL_IP|LIVE_MCP_ENABLED|LIVE_MCP_ADMIN_ENABLED|LIVE_MCP_HOST|LIVE_MCP_ADDITIONAL_BINDS|LIVE_MCP_ALLOWED_PEERS|SERVED_MCP_OFF_DOMAIN_PEER_IP)|TELCLAUDE_BROWSER_(CONTEXT_TOKEN_SECRET|COOKIE_STORE_KEY|CATASTROPHIC_DOMAINS|SUBNET|RELAY_IP|IP)|TELCLAUDE_WHATSAPP_(BRIDGE_SECRET|INBOUND_SECRET)|TELCLAUDE_ISRAEL_SIDECAR_HMAC_(KEY|VAULT_TARGET)|OPERATOR_RPC_(AGENT_PUBLIC_KEY|RELAY_PRIVATE_KEY))='
          grep -Ev "$shell_key_pattern" "$shell_env_file" > "$tmp_file" || true
          {
            cat "$tmp_file"
            printf 'export TELCLAUDE_HERMES_API_SERVER_KEY=%q\n' "$TELCLAUDE_HERMES_API_SERVER_KEY"
            printf 'export TELCLAUDE_HERMES_SOCIAL_API_SERVER_KEY=%q\n' "$TELCLAUDE_HERMES_SOCIAL_API_SERVER_KEY"
            printf 'export TELCLAUDE_HERMES_MCP_RELAY_TOKEN=%q\n' "$TELCLAUDE_HERMES_MCP_RELAY_TOKEN"
            printf 'export TELCLAUDE_HERMES_RELAY_SUBNET=%s\n' "$hermes_private_subnet"
            printf 'export TELCLAUDE_HERMES_SOCIAL_RELAY_SUBNET=%s\n' "$hermes_social_subnet"
            printf 'export TELCLAUDE_HERMES_RELAY_IP=%s\n' "$hermes_relay_ip"
            printf 'export TELCLAUDE_HERMES_SOCIAL_RELAY_IP=%s\n' "$hermes_social_relay_ip"
            printf 'export TELCLAUDE_HERMES_CONTAINED_IP=%s\n' "$hermes_contained_ip"
            printf 'export TELCLAUDE_HERMES_SOCIAL_IP=%s\n' "$hermes_social_ip"
            printf 'export TELCLAUDE_HERMES_LIVE_MCP_ENABLED=%s\n' "$hermes_live_mcp_enabled"
            printf 'export TELCLAUDE_HERMES_LIVE_MCP_ADMIN_ENABLED=%s\n' "$hermes_live_mcp_admin_enabled"
            printf 'export TELCLAUDE_HERMES_LIVE_MCP_HOST=%s\n' "$hermes_relay_ip"
            printf 'export TELCLAUDE_HERMES_LIVE_MCP_ADDITIONAL_BINDS=%s\n' "$hermes_live_mcp_additional_binds"
            printf 'export TELCLAUDE_HERMES_LIVE_MCP_ALLOWED_PEERS=%s\n' "$hermes_live_mcp_allowed_peers"
            printf 'export TELCLAUDE_HERMES_SERVED_MCP_OFF_DOMAIN_PEER_IP=%s\n' "$hermes_social_ip"
            printf 'export TELCLAUDE_INTERNAL_HOSTS=%q\n' "$internal_hosts"
            printf 'export TELCLAUDE_BROWSER_CONTEXT_TOKEN_SECRET=%q\n' "$browser_context_token"
            printf 'export TELCLAUDE_BROWSER_COOKIE_STORE_KEY=%q\n' "$browser_cookie_store_key"
            printf 'export TELCLAUDE_BROWSER_CATASTROPHIC_DOMAINS=%q\n' "$browser_catastrophic_domains"
            printf 'export TELCLAUDE_BROWSER_SUBNET=%s\n' "$browser_subnet"
            printf 'export TELCLAUDE_BROWSER_RELAY_IP=%s\n' "$browser_relay_ip"
            printf 'export TELCLAUDE_BROWSER_IP=%s\n' "$browser_ip"
            printf 'export TELCLAUDE_WHATSAPP_BRIDGE_SECRET=%q\n' "$whatsapp_bridge_secret"
            printf 'export TELCLAUDE_WHATSAPP_INBOUND_SECRET=%q\n' "$whatsapp_inbound_secret"
            [ -z "$israel_sidecar_hmac_key" ] || printf 'export TELCLAUDE_ISRAEL_SIDECAR_HMAC_KEY=%q\n' "$israel_sidecar_hmac_key"
            [ -z "$israel_sidecar_hmac_vault_target" ] || printf 'export TELCLAUDE_ISRAEL_SIDECAR_HMAC_VAULT_TARGET=%q\n' "$israel_sidecar_hmac_vault_target"
            printf 'export OPERATOR_RPC_AGENT_PRIVATE_KEY=%q\n' "$operator_agent_private_key"
            printf 'export OPERATOR_RPC_AGENT_PUBLIC_KEY=%q\n' "$operator_agent_public_key"
            printf 'export OPERATOR_RPC_RELAY_PRIVATE_KEY=%q\n' "$operator_relay_private_key"
            printf 'export OPERATOR_RPC_RELAY_PUBLIC_KEY=%q\n' "$operator_relay_public_key"
          } > "$shell_env_file"
          grep -Ev "$compose_key_pattern" "$compose_env_file" > "$tmp_file" || true
          {
            cat "$tmp_file"
            printf 'TELCLAUDE_HERMES_API_SERVER_KEY=%s\n' "$TELCLAUDE_HERMES_API_SERVER_KEY"
            printf 'TELCLAUDE_HERMES_SOCIAL_API_SERVER_KEY=%s\n' "$TELCLAUDE_HERMES_SOCIAL_API_SERVER_KEY"
            printf 'TELCLAUDE_HERMES_MCP_RELAY_TOKEN=%s\n' "$TELCLAUDE_HERMES_MCP_RELAY_TOKEN"
            printf 'TELCLAUDE_HERMES_RELAY_SUBNET=%s\n' "$hermes_private_subnet"
            printf 'TELCLAUDE_HERMES_SOCIAL_RELAY_SUBNET=%s\n' "$hermes_social_subnet"
            printf 'TELCLAUDE_HERMES_RELAY_IP=%s\n' "$hermes_relay_ip"
            printf 'TELCLAUDE_HERMES_SOCIAL_RELAY_IP=%s\n' "$hermes_social_relay_ip"
            printf 'TELCLAUDE_HERMES_CONTAINED_IP=%s\n' "$hermes_contained_ip"
            printf 'TELCLAUDE_HERMES_SOCIAL_IP=%s\n' "$hermes_social_ip"
            printf 'TELCLAUDE_HERMES_LIVE_MCP_ENABLED=%s\n' "$hermes_live_mcp_enabled"
            printf 'TELCLAUDE_HERMES_LIVE_MCP_ADMIN_ENABLED=%s\n' "$hermes_live_mcp_admin_enabled"
            printf 'TELCLAUDE_HERMES_LIVE_MCP_HOST=%s\n' "$hermes_relay_ip"
            printf 'TELCLAUDE_HERMES_LIVE_MCP_ADDITIONAL_BINDS=%s\n' "$hermes_live_mcp_additional_binds"
            printf 'TELCLAUDE_HERMES_LIVE_MCP_ALLOWED_PEERS=%s\n' "$hermes_live_mcp_allowed_peers"
            printf 'TELCLAUDE_HERMES_SERVED_MCP_OFF_DOMAIN_PEER_IP=%s\n' "$hermes_social_ip"
            printf 'TELCLAUDE_INTERNAL_HOSTS=%s\n' "$internal_hosts"
            printf 'TELCLAUDE_BROWSER_CONTEXT_TOKEN_SECRET=%s\n' "$browser_context_token"
            printf 'TELCLAUDE_BROWSER_COOKIE_STORE_KEY=%s\n' "$browser_cookie_store_key"
            printf 'TELCLAUDE_BROWSER_CATASTROPHIC_DOMAINS=%s\n' "$browser_catastrophic_domains"
            printf 'TELCLAUDE_BROWSER_SUBNET=%s\n' "$browser_subnet"
            printf 'TELCLAUDE_BROWSER_RELAY_IP=%s\n' "$browser_relay_ip"
            printf 'TELCLAUDE_BROWSER_IP=%s\n' "$browser_ip"
            printf 'TELCLAUDE_WHATSAPP_BRIDGE_SECRET=%s\n' "$whatsapp_bridge_secret"
            printf 'TELCLAUDE_WHATSAPP_INBOUND_SECRET=%s\n' "$whatsapp_inbound_secret"
            [ -z "$israel_sidecar_hmac_key" ] || printf 'TELCLAUDE_ISRAEL_SIDECAR_HMAC_KEY=%s\n' "$israel_sidecar_hmac_key"
            [ -z "$israel_sidecar_hmac_vault_target" ] || printf 'TELCLAUDE_ISRAEL_SIDECAR_HMAC_VAULT_TARGET=%s\n' "$israel_sidecar_hmac_vault_target"
            printf 'OPERATOR_RPC_AGENT_PUBLIC_KEY=%s\n' "$operator_agent_public_key"
            printf 'OPERATOR_RPC_RELAY_PRIVATE_KEY=%s\n' "$operator_relay_private_key"
          } > "$compose_env_file"

      - name: Install William post-deploy health gate
        run: |
          set -euo pipefail
          hook_path="/home/avivsinai/.telclaude-ops/william-release/william-actions-post-job-hook.sh"
          mkdir -p "$(dirname "$hook_path")"
          cat > "$hook_path" <<'HOOK'
          #!/usr/bin/env bash
          set -euo pipefail

          echo "William post-deploy gate"
          echo "repo=${GITHUB_REPOSITORY:-} workflow=${GITHUB_WORKFLOW:-} job=${GITHUB_JOB:-} event=${GITHUB_EVENT_NAME:-} ref=${GITHUB_REF:-} sha=${GITHUB_SHA:-}"
          echo "started=$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          if [ "${GITHUB_REPOSITORY:-}" != "avivsinai/telclaude" ] ||
            [ "${GITHUB_WORKFLOW:-}" != "CI" ] ||
            [ "${GITHUB_JOB:-}" != "deploy" ] ||
            [ "${GITHUB_EVENT_NAME:-}" != "push" ] ||
            [ "${GITHUB_REF:-}" != "refs/heads/main" ]; then
            echo "not a William production deploy context; skipping"
            exit 0
          fi

          repo_dir="${WILLIAM_TELCLAUDE_REPO:-/home/avivsinai/telclaude}"
          docker_dir="${repo_dir}/docker"
          if [ ! -d "$docker_dir" ]; then
            echo "missing docker dir: $docker_dir"
            exit 1
          fi

          deployed_sha="$(git -C "$repo_dir" rev-parse HEAD)"
          origin_sha="$(git -C "$repo_dir" rev-parse origin/main 2>/dev/null || printf '%s' "$deployed_sha")"
          if [ -n "${GITHUB_SHA:-}" ] && [ "$deployed_sha" != "$GITHUB_SHA" ]; then
            echo "superseded=1 deployed_sha=$deployed_sha hook_sha=${GITHUB_SHA:-unknown} origin_sha=$origin_sha"
            exit 0
          fi

          cd "$docker_dir"
          compose_files=(-f docker-compose.yml -f docker-compose.hermes.yml -f docker-compose.browser.yml)
          compose_profiles=(--profile whatsapp)
          containers=(
            telclaude
            telclaude-google-services
            telclaude-totp
            telclaude-vault
            telclaude-whatsapp-bridge
            tc-hermes-contained
            tc-hermes-social
            tc-browser
          )

          redact_deploy_logs() {
            sed -E \
              -e 's/(B[e]arer )[A-Za-z0-9._~+\/=-]+/\1[REDACTED]/g' \
              -e 's/((KEY|TOKEN|SECRET|PRIVATE_KEY)=)[^[:space:]]+/\1[REDACTED]/g'
          }

          container_ready() {
            local container="$1"
            local status health
            status="$(docker inspect -f '{{.State.Status}}' "$container" 2>/dev/null || true)"
            health="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$container" 2>/dev/null || true)"
            [ "$status" = "running" ] && { [ "$health" = "healthy" ] || [ "$health" = "none" ]; }
          }

          deadline=$((SECONDS + 600))
          while true; do
            not_ready=()
            for container in "${containers[@]}"; do
              if ! container_ready "$container"; then
                not_ready+=("$container")
              fi
            done

            if [ "${#not_ready[@]}" -eq 0 ]; then
              echo "healthy=1 containers=${containers[*]} deployed_sha=$deployed_sha origin_sha=$origin_sha"
              exit 0
            fi

            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "healthy=0 not_ready=${not_ready[*]} deployed_sha=$deployed_sha origin_sha=$origin_sha"
              docker compose "${compose_files[@]}" "${compose_profiles[@]}" ps 2>&1 | redact_deploy_logs || true
              for container in "${containers[@]}"; do
                echo "::group::${container} state"
                docker inspect --format '{{json .State}}' "$container" 2>&1 | redact_deploy_logs || true
                echo "::endgroup::"
                echo "::group::${container} logs"
                docker logs --tail=120 "$container" 2>&1 | redact_deploy_logs || true
                echo "::endgroup::"
              done
              exit 1
            fi

            echo "waiting for containers: ${not_ready[*]}"
            sleep 5
          done
          HOOK
          sed -i 's/^          //' "$hook_path"
          chmod 700 "$hook_path"

      - name: Ensure William reminder capability scopes
        run: |
          set -euo pipefail
          cd ~/telclaude
          repair_js="$(mktemp)"
          trap 'rm -f "$repair_js"' EXIT
          cat > "$repair_js" <<'NODE'
          const fs = require("fs");

          const [configPath, label] = process.argv.slice(2);
          if (!fs.existsSync(configPath)) {
            console.log(`${label}_schedule_scope=skip reason=missing`);
            process.exit(0);
          }

          const requiredScopes = ["schedule.read", "schedule.write"];
          const raw = fs.readFileSync(configPath, "utf8");
          const parsed = JSON.parse(raw);
          const privateRuntime = parsed?.hermes?.privateRuntime;

          if (!privateRuntime || !Array.isArray(privateRuntime.capabilityScopes)) {
            console.log(`${label}_schedule_scope=skip reason=no_explicit_capabilityScopes`);
            process.exit(0);
          }

          const missing = requiredScopes.filter(
            (scope) => !privateRuntime.capabilityScopes.includes(scope),
          );
          if (missing.length === 0) {
            console.log(`${label}_schedule_scope=present`);
            process.exit(0);
          }

          privateRuntime.capabilityScopes = [...privateRuntime.capabilityScopes, ...missing];
          const stat = fs.statSync(configPath);
          const mode = stat.mode & 0o777;
          const backupPath = `${configPath}.pre-schedule-scope-${Date.now()}.bak`;

          fs.copyFileSync(configPath, backupPath, fs.constants.COPYFILE_EXCL);
          fs.chmodSync(backupPath, mode);
          fs.writeFileSync(configPath, `${JSON.stringify(parsed, null, 2)}\n`, { mode });
          console.log(`${label}_schedule_scope=updated added=${missing.join(",")} backup=${backupPath}`);
          NODE

          node "$repair_js" "$HOME/telclaude/docker/telclaude.json" "host_policy"

          if docker ps --format '{{.Names}}' | grep -Fxq telclaude; then
            docker exec -i -u 0 -w /app telclaude node - "/data/telclaude.json" "live_policy" < "$repair_js"
          else
            echo "live_policy_schedule_scope=skip reason=container_not_running"
          fi

      - name: Build and deploy
        run: |
          set -euo pipefail
          cd ~/telclaude
          # Stamp the deployed commit for the relay startup banner. resolveRevision()
          # checks TELCLAUDE_REVISION first, so this runtime value is authoritative
          # and immune to the Docker layer cache that left the baked .revision stale.
          export TELCLAUDE_REVISION="${GITHUB_SHA:0:7}"
          if ! TELCLAUDE_BUILD_BROWSER=1 ./docker/build.sh; then
            echo "Initial Docker build failed; pruning BuildKit cache and retrying once"
            docker builder prune -af || true
            docker buildx prune -af || true
            TELCLAUDE_BUILD_BROWSER=1 ./docker/build.sh
          fi
          cd docker
          compose_files=(-f docker-compose.yml -f docker-compose.hermes.yml -f docker-compose.browser.yml)
          compose_profiles=(--profile whatsapp)
          redact_deploy_logs() {
            sed -E \
              -e 's/(B[e]arer )[A-Za-z0-9._~+\/=-]+/\1[REDACTED]/g' \
              -e 's/((KEY|TOKEN|SECRET|PRIVATE_KEY)=)[^[:space:]]+/\1[REDACTED]/g'
          }
          dump_container_diagnostics() {
            local container="$1"
            echo "::group::${container} state"
            docker inspect --format '{{json .State}}' "$container" 2>&1 | redact_deploy_logs || true
            echo "::endgroup::"
            echo "::group::${container} logs"
            docker logs --tail=160 "$container" 2>&1 | redact_deploy_logs || true
            echo "::endgroup::"
          }
          container_ready() {
            local container="$1"
            local status health
            status="$(docker inspect -f '{{.State.Status}}' "$container" 2>/dev/null || true)"
            health="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$container" 2>/dev/null || true)"
            [ "$status" = "running" ] && { [ "$health" = "healthy" ] || [ "$health" = "none" ]; }
          }
          wait_for_container_ready() {
            local container="$1"
            local timeout_seconds="${2:-180}"
            local deadline=$((SECONDS + timeout_seconds))
            until container_ready "$container"; do
              if [ "$SECONDS" -ge "$deadline" ]; then
                echo "container_not_ready=$container"
                dump_container_diagnostics "$container"
                return 1
              fi
              sleep 5
            done
          }
          trap 'status=$?; if [ "$status" -ne 0 ]; then docker compose "${compose_files[@]}" "${compose_profiles[@]}" ps 2>&1 | redact_deploy_logs || true; for container in telclaude telclaude-whatsapp-bridge tc-hermes-contained tc-hermes-social tc-browser; do dump_container_diagnostics "$container"; done; docker network ls || true; fi; exit "$status"' EXIT
          docker compose "${compose_files[@]}" "${compose_profiles[@]}" down --remove-orphans || true
          docker rm -f tc-hermes-contained tc-hermes-social tc-browser telclaude-agent telclaude-agent-social >/dev/null 2>&1 || true
          for network in telclaude-hermes-private telclaude-hermes-social telclaude-relay-browser docker_hermes-private-net docker_hermes-social-net docker_relay-browser-net docker_browser-net telclaude-hermes-relay telclaude-agent-relay telclaude-agent-egress telclaude-social-relay telclaude-social-egress; do
            docker network rm "$network" >/dev/null 2>&1 || true
          done
          while IFS= read -r network_id; do
            [ -n "$network_id" ] || continue
            subnet="$(docker network inspect -f '{{range .IPAM.Config}}{{.Subnet}} {{end}}' "$network_id" 2>/dev/null || true)"
            case "$subnet" in
              *192.0.2.0/24*|*192.0.3.0/24*|*172.30.92.0/24*|*172.30.93.0/24*|*172.30.94.0/24*) docker network rm "$network_id" >/dev/null 2>&1 || true ;;
            esac
          done < <(docker network ls -q)
          docker compose "${compose_files[@]}" "${compose_profiles[@]}" up -d --remove-orphans tc-browser
          wait_for_container_ready tc-browser 180
          docker compose "${compose_files[@]}" "${compose_profiles[@]}" up -d --remove-orphans
          docker restart telclaude >/dev/null
          wait_for_container_ready telclaude 180
          docker compose "${compose_files[@]}" "${compose_profiles[@]}" up -d --remove-orphans --wait --wait-timeout 480

      - name: Verify live Hermes runtime gates
        run: |
          set -euo pipefail
          cd ~/telclaude
          report_path="$(mktemp)"
          trap 'rm -f "$report_path"' EXIT
          verify_exit=0
          pnpm --silent dev hermes verify-live --json --skip-mcp --skip-turn --timeout-ms 120000 > "$report_path" || verify_exit=$?
          redact_verify_live_report() {
            sed -E \
              -e 's/(B[e]arer )[A-Za-z0-9._~+\/=-]+/\1[REDACTED]/g' \
              -e 's/((KEY|TOKEN|SECRET|PRIVATE_KEY)=)[^[:space:]]+/\1[REDACTED]/g'
          }
          parse_exit=0
          node - "$report_path" <<'NODE' || parse_exit=$?
          const fs = require("fs");
          const reportPath = process.argv[2];
          const EXPECTED_SCHEMA_VERSION = "telclaude.hermes.verify-live.v1";
          const raw = fs.readFileSync(reportPath, "utf8");

          function parseCandidateJson(candidate) {
            try {
              return JSON.parse(candidate);
            } catch {
              return undefined;
            }
          }

          function findVerifyLiveReport(text) {
            const parsed = parseCandidateJson(text);
            if (parsed?.schemaVersion === EXPECTED_SCHEMA_VERSION) return parsed;

            for (let start = text.indexOf("{"); start >= 0; start = text.indexOf("{", start + 1)) {
              let depth = 0;
              let inString = false;
              let escaped = false;
              for (let index = start; index < text.length; index += 1) {
                const char = text[index];
                if (inString) {
                  if (escaped) {
                    escaped = false;
                  } else if (char === "\\") {
                    escaped = true;
                  } else if (char === "\"") {
                    inString = false;
                  }
                  continue;
                }
                if (char === "\"") {
                  inString = true;
                } else if (char === "{") {
                  depth += 1;
                } else if (char === "}") {
                  depth -= 1;
                  if (depth === 0) {
                    const candidate = parseCandidateJson(text.slice(start, index + 1));
                    if (candidate?.schemaVersion === EXPECTED_SCHEMA_VERSION) return candidate;
                    break;
                  }
                }
              }
            }
            throw new Error("verify-live report JSON with expected schemaVersion was not found");
          }

          const report = findVerifyLiveReport(raw);
          const checks = Array.isArray(report.checks) ? report.checks : [];
          const summary = checks.map((check) => `${check.id}:${check.status}`).join(" ");
          console.log(`verify_live_runtime_status=${report.status} checks=${summary}`);
          for (const check of checks) {
            console.log(`${check.status.toUpperCase().padEnd(4)} ${check.id} - ${check.detail}`);
          }
          if (report.status !== "pass") {
            process.exitCode = 1;
          }
          NODE
          echo "::group::verify-live runtime output"
          redact_verify_live_report < "$report_path" || true
          echo "::endgroup::"
          if [ "$verify_exit" -ne 0 ] || [ "$parse_exit" -ne 0 ]; then
            exit 1
          fi
